[names]
circuit_name   = VCO		# name of modelled circuit 

[timegrid]
t0   = 0.0	# t0 (units of 1/w0) initial time
tf   = 4000.0 	# tf (units of 1/w0) final time
dt   = 0.1	# dt (units of 1/w0) time step

[approximations]

[internal]
w0 = 1.0                # w0 = 1/sqrt(LC)
Qcoil	= 10.0		 	# Q = w0 L / R			quality factor of the coil
alpha_od = 1.25     # alpha_od = G_mo/ (2 G_t)
n = 1.3                 # slope parameter of transistor                  
Vn = 0.0		# voltage noise at coil (in same units as the reference units used for the voltage) 

[initial]
y0 = 0.2   			# y0: 0th vector entry (initial values)
y1 = 0.0			# y2: 1st vector entry (initial values)


[logging]
folder_main = debug		# the root-folder of this run is created
folder_vary = alpha_od	        # the name of the sub-folders in the root-folder (= name of varying/looped parameter)
folder_run  = test        # the name of the root folder

[conditional]
load_sol        = False		# True: load a solution. False: propagate
store_sol       = True		# True: store a solution. False: don't store it
overwrite_folder_joined = True  	# True:		overwrite existing root folder 
overwrite_folder_single = True		# True:		overwrite existing sub-folder of single runs
delete_existing_files 	 = True		# True:		delete existing files in sub-folders

[analysis]
t_st = 500.0 				# t_st: assumed starting time of the steady state
t_z0 = 500.0              # plots in time space will zoom into interval [t_z0, t_zf] 
t_zf = 600.0              # plots in time space will zoom into interval [t_z0, t_zf] 
w_z0 = 0.8		  # plots in Fourier space will zoom into interval [w_z0, w_zf] 
w_zf = 8.2		  # plots in Fourier space will zoom into interval [w_z0, w_zf] 

[default]
g_default = 1.0 		# normalization constant for operators: X = (adag + a) / g_default and P = i (adag - a) / g_default
sign_convention_output = -1.0	# sign convention for output field: a_out(t) = sqrt(gamma) a(t) +- a_in(t)

[methods]
method     = bdf		# integration method 
integrator = zvode 		#  dop853		# integrator 	    
atol       = 1e-8		# abs. tolerance for integration
rtol       = 1e-8		# rel. tolerance for integration
