[names]
circuit_name   = VCOclSp		# name of modelled circuit 

[timegrid]
t0   = 0.0	# t0 (units of 1/w0) initial time
tf   = 100400 # 21362.830044410594021545975006300619612540751915750719582629623227 # 20100.0 # 400000.0 # tf (units of 1/w0) final time
dt   = 0.05 # 0.0314159265358979323846264338327950288419716939937510582097494459 # 0.005 # 1.0	# dt (units of 1/w0) time step

[approximations]

[internal]
w0 = 1.0                # w0 = 1/sqrt(LC)
Qcoil	= 100.0		# Q = w0 L / R			quality factor of the coil ###	VCO	### ###	SPINS 	###
alpha_od = 1.25         # alpha_od = G_mo/ (2 G_t)
n = 1.3                 # slope parameter of transistor        
r_eff = 0.05 # 0.0005 		# r_eff = r1 / (2r) [single-loop] or r_eff = r1 * nwind [long coil]. r1=unit of length, r= coil radius, nwind=#windings/length 
wL  = 1.2		# Lamor frequency, given it in units of w0. Can not be zero due to normalization to M0
T1  = 0.1 	# 5000		# T1 time of the spin system, given in units of 1/w0 ### for w0 ~ 130.92*10^9 /s, 50ns would give T1 w0 = 6546
T2  = 0.1	# 5000 	# T2 time of the spin system, given in units of 1/w0
K = 0.1 # 0.1	# coupling constant K from notes

[initial]
y0 = 1.0  			# y0: 0th vector entry (initial values)
y1 = 0.0			# y2: 1st vector entry (initial values)
Mx = 0.0			# initial spin magnetization, in units of M0
My = 0.0			# initial spin magnetization, in units of M0
Mz = 1.0			# initial spin magnetization, in units of M0

[logging]
folder_main = wchi_regime		# the root-folder of this run is created
folder_vary = T2	        # the name of the sub-folders in the root-folder (= name of varying/looped parameter)
folder_run  = stroboscopicTimes # onlySpins        # the name of the root folder

[conditional]
load_sol        = True		# True: load a solution. False: propagate
store_sol       = True		# True: store a solution. False: don't store it
overwrite_folder_joined = True  	# True:	overwrite existing root folder 
overwrite_folder_single = True		# True:	overwrite existing sub-folder of single runs
delete_existing_files 	= False		# True:	delete existing files in sub-folders
stroboscopic_times = True		# True: all time-grid units are given in units of 2pi/w0 instead of 1/w0

[analysis]
t_st = 400 # 2513.2741228718345907701147066236023073577355195000846567799556738 # 2500.0 # 100000.0 				# t_st: assumed starting time of the steady state
t_z0 = 400 # 2513.2741228718345907701147066236023073577355195000846567799556738  # 100000.0              # plots in time space will zoom into interval [t_z0, t_zf] 
t_zf = 401 # 2827.4333882308139146163790449515525957774524594375952388774501330 # 100100.0              # plots in time space will zoom into interval [t_z0, t_zf] 
w_z0 = 0.99		  # plots in Fourier space will zoom into interval [w_z0, w_zf] 
w_zf = 1.01		  # plots in Fourier space will zoom into interval [w_z0, w_zf] 

[default]
g_default = 1.0 		# normalization constant for operators: X = (adag + a) / g_default and P = i (adag - a) / g_default
sign_convention_output = -1.0	# sign convention for output field: a_out(t) = sqrt(gamma) a(t) +- a_in(t)

[methods]
method     = bdf		# integration method 
integrator = zvode 		#  dop853		# integrator 	    
atol       = 1e-8		# abs. tolerance for integration
rtol       = 1e-8		# rel. tolerance for integration
